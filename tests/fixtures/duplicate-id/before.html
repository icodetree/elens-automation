<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>duplicate-id 테스트</title>
</head>
<body>
  <h1>중복 ID 테스트</h1>

  <!-- 케이스 1: 고유 ID → 변경 없음 -->
  <div id="unique">고유 ID</div>

  <!-- 케이스 2: 중복 ID → 두 번째부터 접미사 추가 -->
  <div id="duplicate">첫 번째</div>
  <div id="duplicate">두 번째</div>
  <div id="duplicate">세 번째</div>

  <!-- 케이스 3: 다른 중복 ID -->
  <span id="another">첫 번째</span>
  <span id="another">두 번째</span>
</body>
</html>
