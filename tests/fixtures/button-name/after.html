<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>button-name 테스트</title>
</head>
<body>
  <h1>버튼 테스트</h1>

  <!-- 케이스 1: 텍스트 있음 → 변경 없음 -->
  <button>저장</button>

  <!-- 케이스 2: aria-label 있음 → 변경 없음 -->
  <button aria-label="닫기"></button>

  <!-- 케이스 3: 내부 img에 alt 있음 → aria-label 추가 (Grade A) -->
  <button class="icon-btn" aria-label="검색">
    <img src="search.svg" alt="검색">
  </button>

  <!-- 케이스 4: 빈 버튼 → Grade B (수동 처리) -->
  <button class="empty-btn"></button>

  <!-- 케이스 5: title 있음 → 변경 없음 -->
  <button title="메뉴 열기"></button>
</body>
</html>
