<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>img-alt 테스트</title>
</head>
<body>
  <h1>이미지 테스트</h1>

  <!-- 케이스 1: alt 속성 없음 → 빈 alt 추가 예정 -->
  <img src="hero.jpg" alt="">

  <!-- 케이스 2: alt 속성 있음 → 변경 없음 -->
  <img src="logo.png" alt="회사 로고">

  <!-- 케이스 3: 장식 이미지 (role=presentation) → 변경 없음 -->
  <img src="divider.png" role="presentation">

  <!-- 케이스 4: alt 속성 없음 → 빈 alt 추가 예정 -->
  <img src="photo.jpg" class="thumbnail" alt="">
</body>
</html>
